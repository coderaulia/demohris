name: Deploy Backend API to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'migrations/**'
      - 'mysql-setup.sql'
      - 'mysql-demo-seed.sql'
      - 'scripts/package-backend.ps1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate required secrets
        env:
          HOSTINGER_BACKEND_FTP_HOST: ${{ secrets.HOSTINGER_BACKEND_FTP_HOST }}
          HOSTINGER_BACKEND_FTP_USER: ${{ secrets.HOSTINGER_BACKEND_FTP_USER }}
          HOSTINGER_BACKEND_FTP_PASSWORD: ${{ secrets.HOSTINGER_BACKEND_FTP_PASSWORD }}
          HOSTINGER_BACKEND_FTP_REMOTE_DIR: ${{ secrets.HOSTINGER_BACKEND_FTP_REMOTE_DIR }}
        run: |
          if [ -z "$HOSTINGER_BACKEND_FTP_HOST" ]; then
            echo "Missing secret: HOSTINGER_BACKEND_FTP_HOST"
            exit 1
          fi
          if [ -z "$HOSTINGER_BACKEND_FTP_USER" ]; then
            echo "Missing secret: HOSTINGER_BACKEND_FTP_USER"
            exit 1
          fi
          if [ -z "$HOSTINGER_BACKEND_FTP_PASSWORD" ]; then
            echo "Missing secret: HOSTINGER_BACKEND_FTP_PASSWORD"
            exit 1
          fi
          if [ -z "$HOSTINGER_BACKEND_FTP_REMOTE_DIR" ]; then
            echo "Missing secret: HOSTINGER_BACKEND_FTP_REMOTE_DIR"
            exit 1
          fi

      - name: Package backend
        run: |
          npm install --silent
          npm run package:backend

      - name: Show package contents
        run: |
          echo "Package created:"
          ls -la deploy/

      - name: Deploy backend to Hostinger via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_BACKEND_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_BACKEND_FTP_USER }}
          password: ${{ secrets.HOSTINGER_BACKEND_FTP_PASSWORD }}
          server-dir: ${{ secrets.HOSTINGER_BACKEND_FTP_REMOTE_DIR }}
          protocol: ftps
          port: 21
          local-dir: ./deploy/backend-hostinger/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Notify deploy success
        if: ${{ success() }}
        env:
          DEPLOY_NOTIFY_WEBHOOK_URL: ${{ secrets.DEPLOY_NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -z "${DEPLOY_NOTIFY_WEBHOOK_URL:-}" ]; then
            echo "No DEPLOY_NOTIFY_WEBHOOK_URL configured, skipping success notification."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$DEPLOY_NOTIFY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"success\",\"type\":\"backend\",\"repository\":\"${{ github.repository }}\",\"sha\":\"${{ github.sha }}\",\"run_url\":\"$RUN_URL\"}"

      - name: Notify deploy failure
        if: ${{ failure() }}
        env:
          DEPLOY_NOTIFY_WEBHOOK_URL: ${{ secrets.DEPLOY_NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -z "${DEPLOY_NOTIFY_WEBHOOK_URL:-}" ]; then
            echo "No DEPLOY_NOTIFY_WEBHOOK_URL configured, skipping failure notification."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$DEPLOY_NOTIFY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"failure\",\"type\":\"backend\",\"repository\":\"${{ github.repository }}\",\"sha\":\"${{ github.sha }}\",\"run_url\":\"$RUN_URL\"}"
