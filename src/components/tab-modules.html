<template id="tab-modules-template">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="mb-1">
                        <i class="bi bi-puzzle me-2"></i>Module Management
                    </h4>
                    <p class="text-muted small mb-0">Enable or disable modules for this installation</p>
                </div>
                <div class="btn-group">
                    <button class="btn btn-outline-secondary btn-sm" onclick="__appModules.refreshModules()">
                        <i class="bi bi-arrow-clockwise me-1"></i>Refresh
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="__appModules.exportConfig()">
                        <i class="bi bi-download me-1"></i>Export
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-4">
            <select class="form-select" id="modules-category-filter" onchange="__appModules.filterByCategory(this.value)">
                <option value="">All Categories</option>
                <option value="core">Core</option>
                <option value="performance">Performance</option>
                <option value="talent">Talent</option>
                <option value="operations">Operations</option>
                <option value="analytics">Analytics</option>
            </select>
        </div>
        <div class="col-md-4">
            <select class="form-select" id="modules-status-filter" onchange="__appModules.filterByStatus(this.value)">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
                <option value="coming_soon">Coming Soon</option>
            </select>
        </div>
        <div class="col-md-4">
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control" id="modules-search" placeholder="Search modules..." oninput="__appModules.searchModules(this.value)">
            </div>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-12">
            <div class="card">
                <div class="card-body py-2">
                    <div class="d-flex gap-3 flex-wrap">
                        <span class="badge bg-success-subtle text-success">
                            <i class="bi bi-check-circle me-1"></i>
                            <span id="modules-active-count">0</span> Active
                        </span>
                        <span class="badge bg-secondary-subtle text-secondary">
                            <i class="bi bi-clock me-1"></i>
                            <span id="modules-inactive-count">0</span> Inactive
                        </span>
                        <span class="badge bg-warning-subtle text-warning">
                            <i class="bi bi-tools me-1"></i>
                            <span id="modules-coming-count">0</span> Coming Soon
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row" id="modules-container">
        <!-- Module cards will be rendered here -->
    </div>
</template>

<template id="module-card-template">
    <div class="col-lg-6 col-xl-4 module-card" data-module-id="">
        <div class="card h-100 module-card-inner">
            <div class="card-header d-flex justify-content-between align-items-start py-3">
                <div class="d-flex align-items-center">
                    <div class="module-icon-wrapper me-3">
                        <i class="bi"></i>
                    </div>
                    <div>
                        <h6 class="mb-0 module-name"></h6>
                        <small class="text-muted module-category"></small>
                    </div>
                </div>
                <div class="module-status-badge">
                    <!-- Status badge will be inserted here -->
                </div>
            </div>
            <div class="card-body">
                <p class="card-text text-muted small module-description"></p>
                <div class="module-dependencies d-none">
                    <small class="text-muted"><i class="bi bi-link-45deg me-1"></i>Depends on:</small>
                    <div class="module-deps-list mt-1"></div>
                </div>
                <div class="module-dependents d-none">
                    <small class="text-warning"><i class="bi bi-exclamation-triangle me-1"></i>Required by:</small>
                    <div class="module-reqs-list mt-1"></div>
                </div>
            </div>
            <div class="card-footer bg-transparent py-3">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="module-version text-muted small"></span>
                    <div class="module-toggle">
                        <!-- Toggle switch will be inserted here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
